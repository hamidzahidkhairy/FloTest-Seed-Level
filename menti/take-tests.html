<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerjakan Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <h1>Kerjakan Tes</h1>

        <div style="display:flex;align-items:center;gap:12px;">
            <a href="dashboard.html" style="text-decoration:none;">
                <button type="button" class="btn-back" style="width:auto;padding:8px 12px;">← Dashboard</button>
            </a>

            <a href="../index.html">
                <button type="button" class="logout-btn">
                    Logout
                </button>
            </a>
        </div>
    </header>

    <main>
        <div class="test-container">
            <!-- Progress Bar -->
            <div class="progress-section">
                <p class="progress-text" id="progressText">Soal 1 dari 3</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 33%;"></div>
                </div>
            </div>

            <section class="menti-test">

                <!-- Question Number -->
                <div class="question-number" id="questionNumber">01</div>

                <!-- Test Name -->
                <div class="test-info">
                    <h3 id="testName">HTML Basic Test</h3>
                </div>

                <!-- Question -->
                <div class="question-section">
                    <h2 id="questionText">Apa fungsi HTML?</h2>
                </div>

                <!-- Options -->
                <form class="options-form" id="optionsForm">
                    <label class="option">
                        <input type="radio" name="jawaban" class="radio-input" value="A">
                        <span class="option-letter">A</span>
                        <span class="option-text">HyperText Markup Language</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="jawaban" class="radio-input" value="B">
                        <span class="option-letter">B</span>
                        <span class="option-text">HyperText Markdown Language</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="jawaban" class="radio-input" value="C">
                        <span class="option-letter">C</span>
                        <span class="option-text">HighText Machine Language</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="jawaban" class="radio-input" value="D">
                        <span class="option-letter">D</span>
                        <span class="option-text">Home Tool Markup Language</span>
                    </label>
                </form>

                <!-- Navigation Buttons -->
                <nav class="test-nav">
                    <button type="button" class="btn-secondary" id="prevButton">
                        ← Sebelumnya
                    </button>

                    <button type="button" class="btn-primary" id="nextButton">
                        Selanjutnya →
                    </button>
                </nav>

                <!-- Submit Button -->
                <nav class="submit-nav">
                    <a href="result.html">
                        <button type="submit" class="btn-submit">
                            ✓ Submit Jawaban
                        </button>
                    </a>
                </nav>

                <!-- Back Button -->
                <nav class="back-nav">
                    <a href="dashboard.html">
                        <button type="button" class="btn-back">
                            ← Kembali ke Dashboard
                        </button>
                    </a>
                </nav>

            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>

    <script>
        const testData = {
            name: 'Dasar Pemrograman',
            questions: [
                {
                    text: 'Apa yang dimaksud dengan variabel dalam pemrograman?',
                    choices: {
                        A: 'Nama khusus untuk menyimpan data/nilai',
                        B: 'Suatu operasi matematika',
                        C: 'Tipe error dalam program',
                        D: 'Fungsi yang tidak penting'
                    }
                },
                {
                    text: 'Tipe data apa yang digunakan untuk menyimpan teks dalam JavaScript?',
                    choices: {
                        A: 'number',
                        B: 'string',
                        C: 'text',
                        D: 'character'
                    }
                },
                {
                    text: 'Apa perbedaan antara == dan === dalam JavaScript?',
                    choices: {
                        A: '== membandingkan nilai, === membandingkan nilai dan tipe data',
                        B: 'Tidak ada perbedaan',
                        C: '=== lebih cepat dari ==',
                        D: '== untuk string, === untuk angka'
                    }
                },
                {
                    text: 'Apa fungsi dari statement if-else dalam sebuah program?',
                    choices: {
                        A: 'Untuk mengulangi kode',
                        B: 'Untuk membuat keputusan berdasarkan kondisi',
                        C: 'Untuk mendeklarasikan variabel',
                        D: 'Untuk membuat fungsi'
                    }
                },
                {
                    text: 'Bagaimana cara membuat array dalam JavaScript?',
                    choices: {
                        A: 'array = {}',
                        B: 'array = ()',
                        C: 'array = []',
                        D: 'array = <>',
                    }
                }
            ]
        };

        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const testName = document.getElementById('testName');
        const optionsForm = document.getElementById('optionsForm');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');

        let currentQuestion = 0;
        const totalQuestions = testData.questions.length;

        // load existing answers or initialize
        let userAnswers = new Array(totalQuestions).fill('');
        try {
            const raw = localStorage.getItem('userAnswers');
            if (raw) {
                const parsed = JSON.parse(raw);
                for (let i = 0; i < Math.min(parsed.length, totalQuestions); i++) {
                    if (parsed[i]) userAnswers[i] = parsed[i];
                }
            }
        } catch (e) { userAnswers = new Array(totalQuestions).fill(''); }

        function persistAnswers() {
            try { localStorage.setItem('userAnswers', JSON.stringify(userAnswers)); } catch(e){}
        }

        function renderQuestion(index) {
            const current = testData.questions[index];
            questionNumber.textContent = String(index + 1).padStart(2, '0');
            testName.textContent = testData.name;
            questionText.textContent = current.text;
            progressText.textContent = `Soal ${index + 1} dari ${totalQuestions}`;
            progressFill.style.width = `${Math.round(((index + 1) / totalQuestions) * 100)}%`;

            const optionElements = optionsForm.querySelectorAll('.option');
            const choices = current.choices;
            const letters = Object.keys(choices);
            optionElements.forEach((option, i) => {
                const letter = letters[i];
                option.querySelector('.option-letter').textContent = letter;
                option.querySelector('.option-text').textContent = choices[letter];
                option.querySelector('input').value = letter;
            });

            // restore previously selected answer
            optionsForm.querySelectorAll('input').forEach(input => {
                input.checked = (input.value === userAnswers[index]);
            });
            optionsForm.querySelectorAll('.option').forEach(item => {
                const inp = item.querySelector('input');
                if (inp && inp.checked) item.classList.add('option-selected');
                else item.classList.remove('option-selected');
            });

            prevButton.disabled = index === 0;
            nextButton.textContent = index === totalQuestions - 1 ? 'Selesaikan →' : 'Selanjutnya →';
            nextButton.disabled = index === totalQuestions - 1;
        }

        optionsForm.addEventListener('click', event => {
            const optionElement = event.target.closest('.option');
            if (!optionElement) return;
            optionsForm.querySelectorAll('.option').forEach(item => item.classList.remove('option-selected'));
            optionElement.classList.add('option-selected');
            const input = optionElement.querySelector('input');
            if (input) {
                input.checked = true;
                userAnswers[currentQuestion] = input.value;
                persistAnswers();
            }
        });

        prevButton.addEventListener('click', () => {
            if (currentQuestion === 0) return;
            currentQuestion -= 1;
            renderQuestion(currentQuestion);
        });

        nextButton.addEventListener('click', () => {
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion += 1;
                renderQuestion(currentQuestion);
            }
        });

        // ensure answers are persisted when clicking submit
        const submitBtn = document.querySelector('.btn-submit');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                persistAnswers();
            });
        }

        renderQuestion(currentQuestion);
    </script>
</body>
</html>
