<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>

        <h1>Hasil Tes</h1>

        <a href="../index.html">
            <button type="button" class="logout-btn">
                Logout
            </button>
        </a>

    </header>

    <main>

        <section class="result-card">
            <div class="result-header">
                <h2 id="scoreText">Nilai: 80</h2>
                <h3 id="testTitle">Nama Tes</h3>
            </div>

            <table class="result-table" id="resultTable">
                <thead>
                    <tr>
                        <th>Soal</th>
                        <th>Jawaban Anda</th>
                        <th>Jawaban Benar</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">A</span></span></td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">A</span></span></td>
                        <td><span class="status-badge status-true">✓ Benar</span></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><span class="answer-cell answer-wrong"><span class="answer-icon">✕</span><span class="answer-text">C</span></span></td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">B</span></span></td>
                        <td><span class="status-badge status-false">✕ Salah</span></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">A</span></span></td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">A</span></span></td>
                        <td><span class="status-badge status-true">✓ Benar</span></td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td><span class="answer-cell answer-wrong"><span class="answer-icon">✕</span><span class="answer-text">D</span></span></td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">B</span></span></td>
                        <td><span class="status-badge status-false">✕ Salah</span></td>
                    </tr>
                    <tr>
                        <td>5</td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">C</span></span></td>
                        <td><span class="answer-cell answer-correct"><span class="answer-icon">✓</span><span class="answer-text">C</span></span></td>
                        <td><span class="status-badge status-true">✓ Benar</span></td>
                    </tr>
                </tbody>
            </table>

            <div class="result-actions">
                <a href="dashboard.html">
                    <button type="button" class="btn-back" style="width:auto;padding:10px 18px;margin-top:16px;">Kembali ke Dashboard</button>
                </a>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>


</body>
</html>
