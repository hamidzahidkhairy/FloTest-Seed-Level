<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>

        <h1>Hasil Tes</h1>

        <a href="../index.html">
            <button type="button" class="logout-btn">
                Logout
            </button>
        </a>

    </header>

    <main>

        <section class="result-card">
            <div class="result-header">
                <h2 id="scoreText">Nilai: 80</h2>
                <h3 id="testTitle">Nama Tes</h3>
            </div>

            <table class="result-table" id="resultTable">
                <thead>
                    <tr>
                            <th>Soal</th>
                            <th>Jawaban Anda</th>
                            <th>Jawaban Benar</th>
                            <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows akan dirender lewat JS -->
                </tbody>
            </table>

            <div class="result-actions">
                <a href="dashboard.html">
                    <button type="button" class="btn-back" style="width:auto;padding:10px 18px;margin-top:16px;">Kembali ke Dashboard</button>
                </a>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>

    <script>
        (function(){
            const testData = {
                name: 'HTML Basic Test',
                questions: [
                    { text: 'Apa fungsi HTML?' },
                    { text: 'Elemen apa yang digunakan untuk membuat link?' },
                    { text: 'Tag mana yang digunakan untuk judul utama?' }
                ]
            };

            const correctAnswers = ['A','B','B'];
            const score = 80; // dummy score

            const scoreText = document.getElementById('scoreText');
            const testTitle = document.getElementById('testTitle');
            const tbody = document.querySelector('#resultTable tbody');

            scoreText.textContent = `Nilai: ${score}`;
            testTitle.textContent = testData.name;

            let userAnswers = [];
            try {
                const raw = localStorage.getItem('userAnswers');
                if (raw) userAnswers = JSON.parse(raw);
            } catch(e) { userAnswers = []; }

            let correctCount = 0;
            for (let i = 0; i < testData.questions.length; i++){
                const tr = document.createElement('tr');
                const tdIndex = document.createElement('td');
                tdIndex.textContent = i + 1;

                // User answer cell
                const tdUser = document.createElement('td');
                const ua = userAnswers[i] || '-';
                if (ua === '-' || ua === '') {
                    tdUser.textContent = '-';
                } else {
                    const isCorrect = ua === correctAnswers[i];
                    const icon = isCorrect ? '✓' : '✕';
                    const wrapper = document.createElement('span');
                    wrapper.className = 'answer-cell';
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'answer-icon';
                    iconSpan.textContent = icon;
                    const textSpan = document.createElement('span');
                    textSpan.className = 'answer-text';
                    textSpan.textContent = ua;
                    wrapper.appendChild(iconSpan);
                    wrapper.appendChild(textSpan);
                    tdUser.appendChild(wrapper);
                    tdUser.classList.add(isCorrect ? 'answer-correct' : 'answer-wrong');
                }

                // Correct answer cell
                const tdCorrect = document.createElement('td');
                const correct = correctAnswers[i] || '-';
                if (correct === '-') {
                    tdCorrect.textContent = '-';
                } else {
                    const wrapperC = document.createElement('span');
                    wrapperC.className = 'answer-cell answer-correct';
                    const iconSpanC = document.createElement('span');
                    iconSpanC.className = 'answer-icon';
                    iconSpanC.textContent = '✓';
                    const textSpanC = document.createElement('span');
                    textSpanC.className = 'answer-text';
                    textSpanC.textContent = correct;
                    wrapperC.appendChild(iconSpanC);
                    wrapperC.appendChild(textSpanC);
                    tdCorrect.appendChild(wrapperC);
                }

                // Status badge
                const tdStatus = document.createElement('td');
                let statusText = '-';
                let statusClass = '';
                if (ua && ua !== '-') {
                    if (ua === correctAnswers[i]) {
                        statusText = 'Benar';
                        statusClass = 'status-true';
                        correctCount += 1;
                    } else {
                        statusText = 'Salah';
                        statusClass = 'status-false';
                    }
                }
                const span = document.createElement('span');
                span.className = `status-badge ${statusClass}`.trim();
                if (statusClass === 'status-true') span.textContent = `✓ ${statusText}`;
                else if (statusClass === 'status-false') span.textContent = `✕ ${statusText}`;
                else span.textContent = statusText;
                tdStatus.appendChild(span);

                tr.appendChild(tdIndex);
                tr.appendChild(tdUser);
                tr.appendChild(tdCorrect);
                tr.appendChild(tdStatus);
                tbody.appendChild(tr);
            }

            // Calculate and display score percentage if there are questions
            if (testData.questions.length > 0) {
                const percent = Math.round((correctCount / testData.questions.length) * 100);
                scoreText.textContent = `Nilai: ${percent}`;
            }
        })();
    </script>

</body>
</html>
