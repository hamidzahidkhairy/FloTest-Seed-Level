<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerjakan Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <h1>Kerjakan Tes</h1>

        <div style="display:flex;align-items:center;gap:12px;">
            <a href="dashboard.html" style="text-decoration:none;">
                <button type="button" class="btn-back" style="width:auto;padding:8px 12px;">← Dashboard</button>
            </a>

            <a href="../index.html">
                <button type="button" class="logout-btn">
                    Logout
                </button>
            </a>
        </div>
    </header>

    <main>
        <div class="test-container">
            <div class="progress-section">
                <p class="progress-text">Soal 5 dari 5</p>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
            </div>

            <section class="menti-test">
                <div class="question-number">05</div>

                <div class="test-info">
                    <h3>Dasar Pemrograman</h3>
                </div>

                <form class="options-form" action="result.html" method="get">
                    <div class="question-section">
                        <h2>5. Apa fungsi dari statement if-else dalam sebuah program?</h2>
                    </div>

                    <label class="option">
                        <input type="radio" name="q5" class="radio-input" value="A">
                        <span class="option-letter">A</span>
                        <span class="option-text">Mengulang kode beberapa kali.</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="q5" class="radio-input" value="B">
                        <span class="option-letter">B</span>
                        <span class="option-text">Menyimpan data ke dalam variabel.</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="q5" class="radio-input" value="C">
                        <span class="option-letter">C</span>
                        <span class="option-text">Menentukan alur program berdasarkan kondisi tertentu.</span>
                    </label>

                    <label class="option">
                        <input type="radio" name="q5" class="radio-input" value="D">
                        <span class="option-letter">D</span>
                        <span class="option-text">Menampilkan hasil ke layar.</span>
                    </label>

                    <nav class="submit-nav">
                        <button type="submit" class="btn-submit">
                            ✓ Submit Jawaban
                        </button>
                    </nav>
                </form>

                <nav class="back-nav">
                    <a href="dashboard.html">
                        <button type="button" class="btn-back">
                            ← Kembali ke Dashboard
                        </button>
                    </a>
                </nav>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>
</body>
</html>
