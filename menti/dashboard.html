<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Menti</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <div>
                <p class="brand-label">Flotest</p>
                <h1>Dashboard Menti</h1>
                <p class="page-subtitle">Lihat tes yang tersedia dan lacak kemajuanmu.</p>
            </div>
            <a href="../index.html">
                <button type="button" class="logout-btn">Logout</button>
            </a>
        </div>
    </header>

    <main>
        <div class="dashboard-hero">
            <div>
                <h2>Halo, Menti!</h2>
                <p>Mulai tes, lihat hasil, dan tingkatkan kemampuanmu setiap hari.</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <article class="dashboard-card">
                <h2>Tes Tersedia</h2>
                <p>1</p>
                <span>Uji kemampuanmu sekarang</span>
            </article>

            <article class="dashboard-card">
                <h2>Tes Selesai</h2>
                <p>1</p>
                <span>Sudah kamu kerjakan</span>
            </article>
        </div>

        <div class="dashboard-actions">
            <a href="take-tests.html"><button type="button" class="btn-primary">Kerjakan Tes</button></a>
            <a href="result.html"><button type="button" class="btn-secondary">Lihat Hasil</button></a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>

</body>
</html>
