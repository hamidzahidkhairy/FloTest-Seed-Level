<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <h1>Form Buat Tes</h1>
    </header>

    <main>

        <section class="mentor-form">

            <form action="#">

                <p>Judul Tes</p>

                <input type="text"
                       placeholder="Masukkan judul tes"
                       required>

                <p>Deskripsi Tes</p>

                <textarea rows="5"
                          placeholder="Masukkan deskripsi tes">
                </textarea>

                <p>Status</p>

                <select required>

                    <option value="">
                        Pilih Status
                    </option>

                    <option>
                        Draft
                    </option>

                    <option>
                        Published
                    </option>

                    <option>
                        Archived
                    </option>

                </select>

                <br><br>

                <button type="submit">
                    Simpan
                </button>

            </form>

        </section>

        <section class="back-nav">

            <nav>

                <a href="dashboard.html">
                    <button type="button">
                        Kembali ke Dashboard
                    </button>
                </a>

            </nav>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>

</body>
</html>
