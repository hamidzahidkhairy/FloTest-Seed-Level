<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
   <header>
    <nav></nav>
</header>

<main>
    <section class="tests-section">
        <h1>Edit Test</h1>
        <form class="tests-form" action="index.html" method="get">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option value="Draft">Draft</option>
                    <option value="Published">Published</option>
                    <option value="Archived">Archived</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Update</button>
            </div>
        </form>
        <div class="back-nav">
            <a href="index.html">
                <button type="button" class="btn-back">Kembali ke Tests</button>
            </a>
        </div>
    </section>
</main>

<footer></footer> 

<script>
    const testData = {
        1: {
            title: 'Dasar Pemrograman',
            description: 'Test mengukur pemahaman tentang konsep dasar pemrograman termasuk variabel, tipe data, loop, conditional statement, dan fungsi.',
            status: 'Published'
        },
        2: {
            title: 'Basis Data',
            description: 'Test mengevaluasi pengetahuan tentang database management, SQL queries, normalisasi, primary key, dan foreign key.',
            status: 'Published'
        },
        3: {
            title: 'Matematika',
            description: 'Test yang mencakup operasi aritmatika, persamaan linear, geometri, bilangan prima, dan perbandingan.',
            status: 'Published'
        }
    };

    function getQueryVariable(variable) {
        const query = window.location.search.substring(1);
        const vars = query.split('&');
        for (let i = 0; i < vars.length; i++) {
            const pair = vars[i].split('=');
            if (decodeURIComponent(pair[0]) === variable) {
                return decodeURIComponent(pair[1]);
            }
        }
        return null;
    }

    const testId = getQueryVariable('id') || '1';
    const selectedTest = testData[testId] || testData[1];

    document.getElementById('title').value = selectedTest.title;
    document.getElementById('description').textContent = selectedTest.description;
    document.getElementById('status').value = selectedTest.status;
</script>
</body>
</html>
