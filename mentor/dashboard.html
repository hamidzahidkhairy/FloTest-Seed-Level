<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mentor</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <div>
                <p class="brand-label">Flotest</p>
                <h1>Dashboard Mentor</h1>
                <p class="page-subtitle">Kelola tes dan lihat status soal dengan mudah.</p>
            </div>
            <a href="../index.html">
                <button type="button" class="logout-btn">Logout</button>
            </a>
        </div>
    </header>

    <main>
        <div class="dashboard-hero">
            <div>
                <h2>Siap Membimbing?</h2>
                <p>Atur soal, pantau peserta, dan tingkatkan kualitas materimu.</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <article class="dashboard-card">
                <h2>Jumlah Tes</h2>
                <p>3</p>
                <span>Total tes aktif</span>
            </article>

            <article class="dashboard-card">
                <h2>Jumlah Soal</h2>
                <p>33</p>
                <span>Soal tersedia di sistem</span>
            </article>
        </div>

        <div class="dashboard-actions">
            <a href="tests/index.html"><button type="button" class="btn-primary">Daftar Tes</button></a>
            <a href="tests/create.html"><button type="button" class="btn-secondary">Buat Tes</button></a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>

</body>
</html>
