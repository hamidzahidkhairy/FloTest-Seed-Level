<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
   <header>
    <nav></nav>
</header>

<main>
    <section class="tests-section">
        <h1>Tests</h1>
        <table class="tests-table" border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Mentor</th>
                    <th>Status</th>
                    <th>Questions Count</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Dasar Pemrograman</td>
                    <td>anto Mentor</td>
                    <td><span class="status-active">Active</span></td>
                    <td>5</td>
                    <td>
                        <a href="questions/index.html?test_id=1" class="btn-view">View Questions</a>
                        <a href="edit.html?id=1" class="btn-edit">Edit</a>
                        <a href="#" class="btn-delete" data-id="1">Delete</a>
                    </td>
                </tr>
                <tr>
                    <td>Basis Data</td>
                    <td>sabar Mentor</td>
                    <td><span class="status-active">Active</span></td>
                    <td>5</td>
                    <td>
                        <a href="questions/index.html?test_id=2" class="btn-view">View Questions</a>
                        <a href="edit.html?id=2" class="btn-edit">Edit</a>
                        <a href="#" class="btn-delete" data-id="2">Delete</a>
                    </td>
                </tr>
                <tr>
                    <td>Matematika</td>
                    <td>ratno Mentor</td>
                    <td><span class="status-inactive">Inactive</span></td>
                    <td>12</td>
                    <td>
                        <a href="questions/index.html?test_id=3" class="btn-view">View Questions</a>
                        <a href="edit.html?id=3" class="btn-edit">Edit</a>
                        <a href="#" class="btn-delete" data-id="3">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="back-nav">
            <a href="../dashboard.html">
                <button type="button" class="btn-back">Kembali ke Dashboard</button>
            </a>
        </div>
    </section>
</main>

<footer></footer> 

<script>
    // Handle delete button
    document.querySelectorAll('.btn-delete').forEach(button => {
        button.addEventListener('click', function(e) {
            e.preventDefault();
            const testId = this.getAttribute('data-id');
            const testTitle = this.closest('tr').querySelector('td').textContent;
            
            if (confirm(`Yakin ingin menghapus test "${testTitle}"?`)) {
                // Remove row from table
                this.closest('tr').remove();
                alert(`Test "${testTitle}" berhasil dihapus!`);
            }
        });
    });
</script>
</body>
</html>
