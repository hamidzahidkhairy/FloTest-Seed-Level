<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body>
   <header>
    <nav></nav>
</header>

<main>
    <section class="tests-section">
        <h1>Edit Question</h1>
        <form class="tests-form" action="index.html" method="get">
            <div class="form-group">
                <label for="questionText">Question Text</label>
                <textarea id="questionText" name="questionText" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="choiceA">Answer A</label>
                <input type="text" id="choiceA" name="choiceA" required>
            </div>

            <div class="form-group">
                <label for="choiceB">Answer B</label>
                <input type="text" id="choiceB" name="choiceB" required>
            </div>

            <div class="form-group">
                <label for="choiceC">Answer C</label>
                <input type="text" id="choiceC" name="choiceC" required>
            </div>

            <div class="form-group">
                <label for="choiceD">Answer D</label>
                <input type="text" id="choiceD" name="choiceD" required>
            </div>

            <div class="form-group">
                <label for="correctAnswer">Correct Answer</label>
                <select id="correctAnswer" name="correctAnswer" required>
                    <option value="">-- Select Correct Answer --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Update</button>
            </div>
        </form>
        <div class="back-nav">
            <a href="index.html">
                <button type="button" class="btn-back">Kembali ke Questions</button>
            </a>
        </div>
    </section>
</main>

<footer></footer> 

<script>
    const testData = {
        1: {
            title: 'Dasar Pemrograman',
            questions: [
                {
                    text: 'Apa yang dimaksud dengan variabel dalam pemrograman?',
                    choices: {
                        A: 'Tempat untuk menyimpan data',
                        B: 'Tipe error',
                        C: 'Fungsi khusus',
                        D: 'Tag HTML'
                    },
                    correct: 'A'
                },
                {
                    text: 'Tipe data apa yang digunakan untuk menyimpan teks dalam JavaScript?',
                    choices: {
                        A: 'number',
                        B: 'string',
                        C: 'boolean',
                        D: 'array'
                    },
                    correct: 'B'
                },
                {
                    text: 'Apa perbedaan antara == dan === dalam JavaScript?',
                    choices: {
                        A: 'Tidak ada perbedaan',
                        B: '== membandingkan nilai, === membandingkan nilai dan tipe data',
                        C: '=== lebih cepat',
                        D: '== hanya untuk angka'
                    },
                    correct: 'B'
                },
                {
                    text: 'Jelaskan apa itu loop dan berikan contoh penggunaannya',
                    choices: {
                        A: 'Kondisi untuk memutus program',
                        B: 'Struktur yang mengulang blok kode',
                        C: 'Cara membuat variabel',
                        D: 'Fungsi pencarian data'
                    },
                    correct: 'B'
                },
                {
                    text: 'Apa fungsi dari statement if-else dalam sebuah program?',
                    choices: {
                        A: 'Untuk membuat keputusan berdasarkan kondisi',
                        B: 'Untuk menghapus data',
                        C: 'Untuk mengulang kode',
                        D: 'Untuk mendeklarasikan fungsi'
                    },
                    correct: 'A'
                }
            ]
        },
        2: {
            title: 'Basis Data',
            questions: [
                {
                    text: 'Apa yang dimaksud dengan database dan apa tujuannya?',
                    choices: {
                        A: 'Alat untuk menulis kode',
                        B: 'Tempat penyimpanan data terstruktur',
                        C: 'Bahasa pemrograman',
                        D: 'Editor teks'
                    },
                    correct: 'B'
                },
                {
                    text: 'Sebutkan 3 contoh sistem manajemen basis data (DBMS)',
                    choices: {
                        A: 'MySQL, PostgreSQL, Oracle',
                        B: 'HTML, CSS, JavaScript',
                        C: 'Windows, Linux, MacOS',
                        D: 'PHP, Python, Ruby'
                    },
                    correct: 'A'
                },
                {
                    text: 'Apa itu primary key dan apa fungsinya dalam sebuah tabel?',
                    choices: {
                        A: 'Kunci untuk menghapus data',
                        B: 'Identitas unik untuk setiap baris',
                        C: 'Nama tabel',
                        D: 'Jenis data string'
                    },
                    correct: 'B'
                },
                {
                    text: 'Jelaskan perbedaan antara SQL dan NoSQL',
                    choices: {
                        A: 'SQL untuk database relasional, NoSQL untuk database non-relasional',
                        B: 'Keduanya sama',
                        C: 'SQL hanya untuk angka',
                        D: 'NoSQL hanya untuk tabel kecil'
                    },
                    correct: 'A'
                },
                {
                    text: 'Apa yang dimaksud dengan normalisasi database?',
                    choices: {
                        A: 'Proses menambah data',
                        B: 'Proses menghapus duplikasi data',
                        C: 'Proses mengubah tipe data',
                        D: 'Proses membuat tabel baru'
                    },
                    correct: 'B'
                }
            ]
        },
        3: {
            title: 'Matematika',
            questions: [
                {
                    text: 'Berapa hasil dari 15 + 23 - 8?',
                    choices: {
                        A: '28',
                        B: '30',
                        C: '32',
                        D: '35'
                    },
                    correct: 'B'
                },
                {
                    text: 'Jika x + 5 = 12, berapakah nilai x?',
                    choices: {
                        A: '5',
                        B: '7',
                        C: '8',
                        D: '12'
                    },
                    correct: 'C'
                },
                {
                    text: 'Apa rumus untuk menghitung keliling lingkaran?',
                    choices: {
                        A: 'πr²',
                        B: '2πr',
                        C: 'r²',
                        D: '2r'
                    },
                    correct: 'B'
                },
                {
                    text: 'Berapa luas segitiga dengan alas 10 cm dan tinggi 8 cm?',
                    choices: {
                        A: '40 cm²',
                        B: '80 cm²',
                        C: '20 cm²',
                        D: '18 cm²'
                    },
                    correct: 'A'
                },
                {
                    text: 'Jelaskan apa itu bilangan prima dan berikan 3 contoh',
                    choices: {
                        A: 'Bilangan yang habis dibagi 1 dan dirinya sendiri',
                        B: 'Bilangan genap',
                        C: 'Bilangan pecahan',
                        D: 'Bilangan negatif'
                    },
                    correct: 'A'
                }
            ]
        }
    };

    function getQueryVariable(variable) {
        const query = window.location.search.substring(1);
        const vars = query.split('&');
        for (let i = 0; i < vars.length; i++) {
            const pair = vars[i].split('=');
            if (decodeURIComponent(pair[0]) === variable) {
                return decodeURIComponent(pair[1]);
            }
        }
        return null;
    }

    const testId = getQueryVariable('test_id') || '1';
    const questionId = getQueryVariable('question') || '1';
    const selectedTest = testData[testId] || testData[1];
    const question = selectedTest.questions[questionId - 1] || selectedTest.questions[0];

    document.getElementById('questionText').value = question.text;
    document.getElementById('choiceA').value = question.choices.A;
    document.getElementById('choiceB').value = question.choices.B;
    document.getElementById('choiceC').value = question.choices.C;
    document.getElementById('choiceD').value = question.choices.D;
    document.getElementById('correctAnswer').value = question.correct;
</script>
</body>
</html>
