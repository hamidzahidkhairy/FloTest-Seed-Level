<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Dashboard Admin</title>
</head>
<body>

    <header>
        <div class="header-inner">
            <div>
                <p class="brand-label">Flotest</p>
                <h1>Dashboard Admin</h1>
                <p class="page-subtitle">Kelola mentor, menti, dan tes dalam satu tempat.</p>
            </div>
            <a href="../index.html">
                <button type="button" class="logout-btn">Logout</button>
            </a>
        </div>
    </header>

    <main>
        <div class="dashboard-hero">
            <div>
                <h2>Selamat datang, Admin</h2>
                <p>Monitor semua data penting dan jalankan platform dengan kontrol penuh.</p>
            </div>
        </div>

        <div class="dashboard-actions">
            <a href="#"><button type="button" class="btn-primary">Mentor</button></a>
            <a href="#"><button type="button" class="btn-primary">Menti</button></a>
            <a href="#"><button type="button" class="btn-secondary">Tes</button></a>
        </div>

        <div class="dashboard-grid">
            <article class="dashboard-card">
                <h2>Total Mentor</h2>
                <p>25</p>
                <span>Pengajar terdaftar</span>
            </article>

            <article class="dashboard-card">
                <h2>Total Menti</h2>
                <p>20</p>
                <span>Peserta aktif</span>
            </article>

            <article class="dashboard-card">
                <h2>Total Tes</h2>
                <p>15</p>
                <span>Tes tersedia di sistem</span>
            </article>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Flotest</p>
    </footer>
    
</body>
</html>
